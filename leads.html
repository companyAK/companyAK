<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AK's Lead Finder — Austin TX</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f13;
      color: #e4e4e7;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 24px 32px;
      border-bottom: 1px solid #2a2a3e;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
    }

    header h1 span { color: #f97316; }

    header p {
      color: #9ca3af;
      margin-top: 4px;
      font-size: 0.9rem;
    }

    .stats {
      display: flex;
      gap: 16px;
      padding: 20px 32px;
      background: #12121a;
      border-bottom: 1px solid #1e1e2e;
      flex-wrap: wrap;
    }

    .stat {
      background: #1e1e2e;
      border-radius: 10px;
      padding: 14px 20px;
      min-width: 140px;
    }

    .stat .num {
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1;
    }

    .stat .label {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat.high .num { color: #f97316; }
    .stat.medium .num { color: #eab308; }
    .stat.total .num { color: #60a5fa; }

    .controls {
      display: flex;
      gap: 12px;
      padding: 16px 32px;
      background: #0f0f13;
      border-bottom: 1px solid #1e1e2e;
      flex-wrap: wrap;
      align-items: center;
    }

    input[type="text"] {
      background: #1e1e2e;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      color: #e4e4e7;
      padding: 8px 14px;
      font-size: 0.9rem;
      width: 260px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #f97316;
    }

    .filter-btn {
      background: #1e1e2e;
      border: 1px solid #2a2a3e;
      color: #9ca3af;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.15s;
    }

    .filter-btn:hover, .filter-btn.active {
      background: #f97316;
      border-color: #f97316;
      color: #fff;
    }

    .filter-btn.medium.active {
      background: #eab308;
      border-color: #eab308;
    }

    .filter-btn.low.active {
      background: #6b7280;
      border-color: #6b7280;
    }

    .table-wrap {
      padding: 24px 32px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead th {
      text-align: left;
      padding: 10px 14px;
      color: #6b7280;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #1e1e2e;
      cursor: pointer;
      user-select: none;
    }

    thead th:hover { color: #e4e4e7; }

    tbody tr {
      border-bottom: 1px solid #1a1a24;
      transition: background 0.1s;
    }

    tbody tr:hover { background: #1a1a2e; }

    tbody td {
      padding: 12px 14px;
      vertical-align: middle;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge.high { background: rgba(249,115,22,0.15); color: #f97316; border: 1px solid rgba(249,115,22,0.3); }
    .badge.medium { background: rgba(234,179,8,0.15); color: #eab308; border: 1px solid rgba(234,179,8,0.3); }
    .badge.low { background: rgba(107,114,128,0.15); color: #9ca3af; border: 1px solid rgba(107,114,128,0.3); }

    .biz-name { font-weight: 600; color: #fff; }
    .address { color: #6b7280; font-size: 0.8rem; margin-top: 2px; }

    .phone a {
      color: #60a5fa;
      text-decoration: none;
    }
    .phone a:hover { text-decoration: underline; }

    .website-none {
      color: #ef4444;
      font-weight: 600;
      font-size: 0.8rem;
    }

    .website-link a {
      color: #34d399;
      text-decoration: none;
      font-size: 0.8rem;
    }

    .stars { color: #eab308; }

    .no-results {
      text-align: center;
      padding: 60px;
      color: #4b5563;
      font-size: 1rem;
    }

    .count-label {
      margin-left: auto;
      color: #4b5563;
      font-size: 0.85rem;
    }

    @media (max-width: 768px) {
      header, .stats, .controls, .table-wrap { padding-left: 16px; padding-right: 16px; }
      input[type="text"] { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <h1>AK's <span>Lead Finder</span> 🔥</h1>
  <p>Service businesses in Austin, TX that need help with their online presence</p>
</header>

<div class="stats">
  <div class="stat high">
    <div class="num" id="stat-high">—</div>
    <div class="label">🔥 No Website</div>
  </div>
  <div class="stat medium">
    <div class="num" id="stat-medium">—</div>
    <div class="label">⚡ Low Reviews</div>
  </div>
  <div class="stat total">
    <div class="num" id="stat-total">—</div>
    <div class="label">Total Leads</div>
  </div>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="🔍 Search businesses..." oninput="render()" />
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" data-filter="high" onclick="setFilter('high', this)">🔥 No Website</button>
  <button class="filter-btn medium" data-filter="medium" onclick="setFilter('medium', this)">⚡ Low Reviews</button>
  <button class="filter-btn low" data-filter="low" onclick="setFilter('low', this)">📌 Has Web</button>
  <span class="count-label" id="count-label"></span>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('priority')">Priority ↕</th>
        <th onclick="sortBy('name')">Business ↕</th>
        <th>Phone</th>
        <th>Website</th>
        <th onclick="sortBy('rating')">Rating ↕</th>
        <th onclick="sortBy('reviews')">Reviews ↕</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
  <div class="no-results" id="no-results" style="display:none">No businesses found. Try a different search.</div>
</div>

<script>
let leads = [];
let currentFilter = 'all';
let sortKey = 'priority';
let sortAsc = true;

// Inline CSV data
const CSV = `PLACEHOLDER_CSV`;

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    const parts = [];
    let cur = '', inQ = false;
    for (let ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { parts.push(cur); cur = ''; }
      else { cur += ch; }
    }
    parts.push(cur);
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (parts[i] || '').trim());
    return obj;
  });
}

function priorityRank(p) {
  if (p.includes('HIGH')) return 0;
  if (p.includes('MEDIUM')) return 1;
  return 2;
}

function badgeClass(p) {
  if (p.includes('HIGH')) return 'high';
  if (p.includes('MEDIUM')) return 'medium';
  return 'low';
}

function badgeLabel(p) {
  if (p.includes('HIGH')) return '🔥 No Website';
  if (p.includes('MEDIUM')) return '⚡ Low Reviews';
  return '📌 Has Web';
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function sortBy(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = true; }
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  let filtered = leads.filter(l => {
    const matchSearch = !q || l['Business Name'].toLowerCase().includes(q) || l['Address'].toLowerCase().includes(q);
    const p = l['Priority'];
    const matchFilter =
      currentFilter === 'all' ||
      (currentFilter === 'high' && p.includes('HIGH')) ||
      (currentFilter === 'medium' && p.includes('MEDIUM')) ||
      (currentFilter === 'low' && p.includes('LOW'));
    return matchSearch && matchFilter;
  });

  filtered.sort((a, b) => {
    let av, bv;
    if (sortKey === 'priority') { av = priorityRank(a['Priority']); bv = priorityRank(b['Priority']); }
    else if (sortKey === 'name') { av = a['Business Name'].toLowerCase(); bv = b['Business Name'].toLowerCase(); }
    else if (sortKey === 'rating') { av = parseFloat(a['Rating']) || -1; bv = parseFloat(b['Rating']) || -1; }
    else if (sortKey === 'reviews') { av = parseInt(a['Reviews']) || 0; bv = parseInt(b['Reviews']) || 0; }
    if (av < bv) return sortAsc ? -1 : 1;
    if (av > bv) return sortAsc ? 1 : -1;
    return 0;
  });

  const tbody = document.getElementById('table-body');
  const noResults = document.getElementById('no-results');
  document.getElementById('count-label').textContent = `${filtered.length} businesses`;

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  tbody.innerHTML = filtered.map(l => {
    const bc = badgeClass(l['Priority']);
    const bl = badgeLabel(l['Priority']);
    const phone = l['Phone'] ? `<a href="tel:${l['Phone']}">${l['Phone']}</a>` : '<span style="color:#4b5563">—</span>';
    const website = l['Website'] === 'NONE'
      ? '<span class="website-none">✗ No Website</span>'
      : `<span class="website-link"><a href="${l['Website']}" target="_blank">↗ Visit</a></span>`;
    const rating = l['Rating'] !== 'N/A' ? `<span class="stars">★</span> ${l['Rating']}` : '<span style="color:#4b5563">—</span>';
    const reviews = l['Reviews'] > 0 ? l['Reviews'] : '<span style="color:#4b5563">0</span>';
    return `
      <tr>
        <td><span class="badge ${bc}">${bl}</span></td>
        <td>
          <div class="biz-name">${l['Business Name']}</div>
          <div class="address">${l['Address']}</div>
        </td>
        <td class="phone">${phone}</td>
        <td>${website}</td>
        <td>${rating}</td>
        <td>${reviews}</td>
      </tr>`;
  }).join('');
}

// Load CSV
fetch('leads_latest.csv')
  .then(r => r.text())
  .then(text => {
    leads = parseCSV(text);
    const high = leads.filter(l => l['Priority'].includes('HIGH')).length;
    const medium = leads.filter(l => l['Priority'].includes('MEDIUM')).length;
    document.getElementById('stat-high').textContent = high;
    document.getElementById('stat-medium').textContent = medium;
    document.getElementById('stat-total').textContent = leads.length;
    render();
  })
  .catch(() => {
    document.getElementById('table-body').innerHTML = '';
    document.getElementById('no-results').style.display = 'block';
    document.getElementById('no-results').textContent = '⚠️ Could not load CSV. Make sure leads CSV is in the same folder as this HTML file.';
  });
</script>
</body>
</html>
